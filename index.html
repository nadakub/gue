<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cautare intrebari licenta</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="top">
    <div class="wrap">
      <h1>Cautare intrebari licenta</h1>
      <p>Cauta simplu dupa text, numar, categorie sau raspuns. Cautarea ignora diacriticele.</p>
      <div class="stats"><span id="totalCount">Se incarca...</span></div>
    </div>
  </header>

  <main class="wrap">
    <section class="searchBox">
      <label for="searchInput">Cauta intrebare</label>
      <div class="searchRow">
        <input id="searchInput" type="search" list="suggestions" autocomplete="off" placeholder="Ex: Keynes, PIB, management, 42..." />
        <button id="clearBtn" type="button">Sterge</button>
      </div>
      <datalist id="suggestions"></datalist>
      <p id="statusText" class="status">Tasteaza minim 2 caractere pentru cautare.</p>
    </section>

    <section id="results" class="results"></section>
  </main>

  <footer class="wrap footer">
    
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
