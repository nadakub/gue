<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cautare intrebari licenta</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <div class="wrap">
      <h1>Cautare intrebari licenta</h1>
      <p>Cauta rapid dupa text, numar, categorie sau raspuns. Cautarea ignora diacriticele.</p>
      <div class="stats"><span id="totalCount">0 intrebari</span></div>
    </div>
  </header>

  <main class="wrap layout">
    <section class="card search-card">
      <label for="searchInput">Cauta intrebare</label>
      <div class="search-row">
        <input id="searchInput" type="search" list="suggestions" autocomplete="off" placeholder="Scrie un cuvant sau numarul intrebarii..." />
        <button id="clearBtn" type="button">Sterge</button>
      </div>
      <datalist id="suggestions"></datalist>
      <p class="hint"><span id="resultCount">0 rezultate</span>. Daca exista mai multe potriviri, apar toate mai jos.</p>
    </section>

    <section id="results" class="results"></section>
  </main>

  <footer class="wrap footer">Aplicatie statica pentru GitHub Pages.</footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
